    <text x="132" y="118" font-size="13" letter-spacing="3" opacity="0.7">CLINICAL SYMPTOM INTELLIGENCE</text>
  </g>

  <g font-family="Georgia, serif" fill="#F8F7F5" opacity="0.55">
