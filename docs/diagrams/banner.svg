      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1C2E4A"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="200" fill="url(#bg)"/>

  <g stroke="#B8965A" stroke-width="1" opacity="0.18">
