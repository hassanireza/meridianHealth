<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="720" height="340" fill="#F8F7F5"/>
  <rect x="1" y="1" width="718" height="338" fill="none" stroke="#0A1628" stroke-width="1" stroke-opacity="0.15"/>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="360" y="36" text-anchor="middle" fill="#0A1628" font-size="15" letter-spacing="1">CI / CD PIPELINE</text>
    <text x="360" y="55" text-anchor="middle" fill="#0A1628" font-size="10" letter-spacing="0.4" opacity="0.6">GitHub Actions &#8594; GitHub Pages</text>

    <!-- Step 1 -->
    <rect x="30" y="100" width="140" height="90" rx="3" fill="none" stroke="#0A1628" stroke-width="1.25"/>
    <text x="100" y="132" text-anchor="middle" fill="#0A1628" font-size="11" letter-spacing="0.3">Push / PR</text>
    <text x="100" y="150" text-anchor="middle" fill="#0A1628" font-size="9" opacity="0.65">main branch</text>
    <text x="100" y="164" text-anchor="middle" fill="#0A1628" font-size="9" opacity="0.65">or pull request</text>

    <line x1="170" y1="145" x2="204" y2="145" stroke="#B8965A" stroke-width="1.5"/>
    <polygon points="204,145 194,140 194,150" fill="#B8965A"/>

    <!-- Step 2 -->
    <rect x="210" y="100" width="140" height="90" rx="3" fill="none" stroke="#0A1628" stroke-width="1.25"/>
    <text x="280" y="127" text-anchor="middle" fill="#0A1628" font-size="11" letter-spacing="0.3">Install &amp; Lint</text>
    <text x="280" y="145" text-anchor="middle" fill="#0A1628" font-size="9" opacity="0.65">npm ci</text>
    <text x="280" y="159" text-anchor="middle" fill="#0A1628" font-size="9" opacity="0.65">oxlint</text>

    <line x1="350" y1="145" x2="384" y2="145" stroke="#B8965A" stroke-width="1.5"/>
    <polygon points="384,145 374,140 374,150" fill="#B8965A"/>

    <!-- Step 3 -->
    <rect x="390" y="100" width="140" height="90" rx="3" fill="none" stroke="#0A1628" stroke-width="1.25"/>
    <text x="460" y="127" text-anchor="middle" fill="#0A1628" font-size="11" letter-spacing="0.3">Type Check</text>
    <text x="460" y="145" text-anchor="middle" fill="#0A1628" font-size="9" opacity="0.65">tsc -b</text>
    <text x="460" y="159" text-anchor="middle" fill="#0A1628" font-size="9" opacity="0.65">&amp; build</text>

    <line x1="530" y1="145" x2="564" y2="145" stroke="#B8965A" stroke-width="1.5"/>
    <polygon points="564,145 554,140 554,150" fill="#B8965A"/>

    <!-- Step 4 -->
    <rect x="570" y="100" width="130" height="90" rx="3" fill="#0A1628"/>
    <text x="635" y="127" text-anchor="middle" fill="#F8F7F5" font-size="11" letter-spacing="0.3">Deploy</text>
    <text x="635" y="145" text-anchor="middle" fill="#B8965A" font-size="9">GitHub Pages</text>
    <text x="635" y="159" text-anchor="middle" fill="#F8F7F5" font-size="9" opacity="0.65">main only</text>

    <line x1="100" y1="190" x2="100" y2="216" stroke="#B8965A" stroke-width="1.2" stroke-dasharray="3 3"/>
    <text x="100" y="234" text-anchor="middle" fill="#0A1628" font-size="9" opacity="0.55">.github/workflows/</text>
    <text x="100" y="248" text-anchor="middle" fill="#0A1628" font-size="9" opacity="0.55">ci.yml</text>

    <line x1="635" y1="190" x2="635" y2="216" stroke="#B8965A" stroke-width="1.2" stroke-dasharray="3 3"/>
    <text x="635" y="234" text-anchor="middle" fill="#0A1628" font-size="9" opacity="0.55">.github/workflows/</text>
    <text x="635" y="248" text-anchor="middle" fill="#0A1628" font-size="9" opacity="0.55">deploy.yml</text>

    <text x="360" y="300" text-anchor="middle" fill="#0A1628" font-size="9" letter-spacing="0.3" opacity="0.45">Pull requests run lint and build only. Merges to main additionally publish to Pages.</text>
  </g>
</svg>
