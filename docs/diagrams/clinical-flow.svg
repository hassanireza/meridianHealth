<svg viewBox="0 0 1000 180" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1000" height="180" fill="#F8F7F5"/>
  <rect x="1" y="1" width="998" height="178" fill="none" stroke="#0A1628" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Step boxes -->
  <g font-family="Georgia, 'Times New Roman', serif">
    <!-- 1 -->
    <rect x="20" y="60" width="160" height="60" rx="2" fill="#0A1628"/>
    <text x="100" y="85" text-anchor="middle" fill="#F8F7F5" font-size="12" letter-spacing="0.5">HUMAN</text>
    <text x="100" y="102" text-anchor="middle" fill="#F8F7F5" font-size="12" letter-spacing="0.5">EXPERIENCE</text>

    <!-- arrow -->
    <line x1="180" y1="90" x2="218" y2="90" stroke="#B8965A" stroke-width="1.5"/>
    <polygon points="218,90 210,85 210,95" fill="#B8965A"/>

    <!-- 2 -->
    <rect x="226" y="60" width="160" height="60" rx="2" fill="none" stroke="#0A1628" stroke-width="1.25"/>
    <text x="306" y="85" text-anchor="middle" fill="#0A1628" font-size="12" letter-spacing="0.5">SYMPTOM</text>
    <text x="306" y="102" text-anchor="middle" fill="#0A1628" font-size="12" letter-spacing="0.5">INPUT</text>

    <line x1="386" y1="90" x2="424" y2="90" stroke="#B8965A" stroke-width="1.5"/>
    <polygon points="424,90 416,85 416,95" fill="#B8965A"/>

    <!-- 3 -->
    <rect x="432" y="60" width="170" height="60" rx="2" fill="none" stroke="#0A1628" stroke-width="1.25"/>
    <text x="517" y="85" text-anchor="middle" fill="#0A1628" font-size="12" letter-spacing="0.5">ANATOMICAL</text>
    <text x="517" y="102" text-anchor="middle" fill="#0A1628" font-size="12" letter-spacing="0.5">MAPPING</text>

    <line x1="602" y1="90" x2="640" y2="90" stroke="#B8965A" stroke-width="1.5"/>
    <polygon points="640,90 632,85 632,95" fill="#B8965A"/>

    <!-- 4 -->
    <rect x="648" y="60" width="190" height="60" rx="2" fill="none" stroke="#B8965A" stroke-width="1.5"/>
    <text x="743" y="85" text-anchor="middle" fill="#0A1628" font-size="12" letter-spacing="0.5">CLINICAL INTELLIGENCE</text>
    <text x="743" y="102" text-anchor="middle" fill="#0A1628" font-size="12" letter-spacing="0.5">ENGINE</text>

    <line x1="838" y1="90" x2="876" y2="90" stroke="#B8965A" stroke-width="1.5"/>
    <polygon points="876,90 868,85 868,95" fill="#B8965A"/>

    <!-- 5 -->
    <rect x="884" y="60" width="96" height="60" rx="2" fill="#0A1628"/>
    <text x="932" y="85" text-anchor="middle" fill="#F8F7F5" font-size="11" letter-spacing="0.3">STRUCTURED</text>
    <text x="932" y="102" text-anchor="middle" fill="#F8F7F5" font-size="11" letter-spacing="0.3">INSIGHT</text>
  </g>
</svg>
